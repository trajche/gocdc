source:
  addr: "127.0.0.1:3306"
  user: "root"
  password: ""
  database: "mydb"
  flavor: "mariadb"   # or "mysql"
  server_id: 101

# Multiple sinks — every row event is fanned out to all sinks.
# Each sink has its own mode:
#   "upsert" (default) — compact, latest state only (ON CONFLICT DO UPDATE)
#   "log"              — append-only changelog (Flink-style +I/-U/+U/-D events)
sinks:
  - type: "postgres"
    mode: "upsert"
    dsn: "postgres://user@127.0.0.1:5432/mydb?sslmode=disable"
    schema: "cdc"

  # Append-only event log in a separate schema
  # - type: "postgres"
  #   mode: "log"
  #   dsn: "postgres://user@127.0.0.1:5432/mydb?sslmode=disable"
  #   schema: "cdc_log"

  # - type: "redis"
  #   mode: "upsert"       # HSET per row
  #   addr: "127.0.0.1:6379"
  #   password: ""
  #   db: 0
  #   prefix: "cdc"

  # - type: "redis"
  #   mode: "log"           # RPUSH JSON events to {prefix}:{table}:{pk}:log
  #   addr: "127.0.0.1:6379"
  #   prefix: "cdc_log"

  # - type: "redis-json"
  #   mode: "upsert"
  #   addr: "127.0.0.1:6379"
  #   prefix: "cdc"

  # - type: "stdout"        # JSON lines — always emits all event kinds

batch_size: 1000
flush_interval: "500ms"
checkpoint_file: "checkpoint.json"

tables:
  - source: "users"
    target: "users"
    primary_key: ["id"]
    columns:
      - { source: "id",    target: "id" }
      - { source: "name",  target: "name" }
      - { source: "email", target: "email" }
    # snapshot_filter: "active = 1"
    # stream_filter:
    #   column: "status"
    #   values: ["active", "pending"]
    #   pattern: "prefix_%"    # SQL LIKE pattern (alternative to values)
